

on:
  push:
    branches: ["main"]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    
    # 1. TELL GITHUB ACTIONS TO RUN ALL STEPS INSIDE THE LAVA FOLDER
    defaults:
      run:
        working-directory: ./lava

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Setup Node.js Environment
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup Github Pages Configurations
        uses: actions/configure-pages@v5
        with:
          static_site_generator: next

      - name: Install Project Dependencies
        run: npm ci

      - name: Compile and Export Static HTML
        run: npm run build

      - name: Upload Build Artifacts
        uses: actions/upload-pages-artifact@v3
        with:
          # 2. MATCH THE EXPORT LOCATION TO YOUR LAVA SUBFOLDER
          path: ./lava/out

      - name: Deploy to Live Server
        id: deployment
        uses: actions/deploy-pages@v4
